spring.application.name=payment-system
server.port=${PORT:8080}

app.public-url=${APP_PUBLIC_URL:http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173/}
app.cors.patterns=${APP_CORS_PATTERNS:http://localhost:*,http://127.0.0.1:*}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:} 
